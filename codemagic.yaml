workflows:
  ios-workflow:
    name: KMM iOS Workflow
    max_build_duration: 120

    integrations:
      app_store_connect: myapp17247

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.exam.myapplication

      vars:
        APP_STORE_APPLE_ID: 6760695904
        XCODE_PROJECT: "iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"

    scripts:
      - name: Cocoapods installation
        script: | 
          cd $CM_BUILD_DIR/iosApp
          pod install
      - name: Set up code signing settings on Xcode project
        script: | 
          cd $CM_BUILD_DIR/iosApp
          xcode-project use-profiles \
          --project "$XCODE_PROJECT" \
          --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build ipa for distribution
        script: | 
          cd $CM_BUILD_DIR/iosApp
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - iosApp/build/ios/ipa/*.ipa
